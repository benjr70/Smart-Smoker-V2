---
all:
  children:
    runners:
      hosts:
        github-runner:
          ansible_host: smoker-runner  # Tailscale hostname (100.105.61.87)
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    cloud_servers:
      children:
        dev_cloud:
          hosts:
            smart-smoker-dev-cloud-1:
              # Tailscale hostname must match GitHub repo variable `vars.DEV_CLOUD_HOST` (issue #189).
              # Source of truth lives in GitHub Actions; update both together when the peer is re-provisioned.
              ansible_host: smoker-dev-cloud-1
              ansible_user: root
              ansible_python_interpreter: /usr/bin/python3
              environment: dev

        prod_cloud:
          hosts:
            smart-smoker-cloud-prod:
              # Connect over the direct bridge IP, not the Tailscale MagicDNS name
              # (smokecloud-2 / 100.92.43.59). The tailscale role is the last role in
              # setup-prod-cloud.yml; managing tailscale over its own SSH session severs
              # the control connection mid-play and the apply reports failed=1 (issue #250).
              # The self-hosted proxmox runner is on the 10.20.0.0/24 bridge, so the direct
              # IP is reachable. Mirrors the virtual-smoker direct-IP provisioning pattern.
              ansible_host: 10.20.0.30  # Direct bridge IP (Tailscale name: smokecloud-2)
              ansible_user: root
              ansible_python_interpreter: /usr/bin/python3
              environment: prod

    # Virtual Smoker Devices (Phase 3 Story 2)
    # TODO(post-provision): After first successful Tailscale provisioning,
    #   change ansible_host from 10.20.0.40 to "virtual-smoker" (Tailscale hostname)
    #   to match the pattern used by runners and cloud_servers above.
    devices:
      hosts:
        virtual-smoker-device:
          ansible_host: 10.20.0.40  # Direct IP for initial provisioning
          ansible_user: smoker
          ansible_python_interpreter: /usr/bin/python3
