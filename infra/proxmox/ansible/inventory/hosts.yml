---
all:
  children:
    runners:
      hosts:
        github-runner:
          ansible_host: smoker-runner  # Tailscale hostname (100.105.61.87)
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    cloud_servers:
      children:
        dev_cloud:
          hosts:
            smart-smoker-dev-cloud-1:
              # Tailscale hostname must match GitHub repo variable `vars.DEV_CLOUD_HOST` (issue #189).
              # Source of truth lives in GitHub Actions; update both together when the peer is re-provisioned.
              ansible_host: smoker-dev-cloud-1
              ansible_user: root
              ansible_python_interpreter: /usr/bin/python3
              environment: dev

        prod_cloud:
          hosts:
            smart-smoker-cloud-prod:
              ansible_host: smokecloud-1  # Tailscale hostname (100.83.77.76)
              ansible_user: root
              ansible_python_interpreter: /usr/bin/python3
              environment: prod

    # Virtual Smoker Devices (Phase 3 Story 2)
    # TODO(post-provision): After first successful Tailscale provisioning,
    #   change ansible_host from 10.20.0.40 to "virtual-smoker" (Tailscale hostname)
    #   to match the pattern used by runners and cloud_servers above.
    devices:
      hosts:
        virtual-smoker-device:
          ansible_host: 10.20.0.40  # Direct IP for initial provisioning
          ansible_user: smoker
          ansible_python_interpreter: /usr/bin/python3
