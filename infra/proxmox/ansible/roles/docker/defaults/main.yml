---
# Docker role default variables

# Docker users to add to the docker group
docker_users: []

# Docker version pinning (optional)
# Set to a specific version pattern to pin Docker to that version
# Examples:
#   - "5:24.0*" - Pin to Docker 24.0.x (for production parity with Raspberry Pi)
#   - "5:25.0*" - Pin to Docker 25.0.x
#   - "" (empty) - Install latest available version
# Format follows apt package versioning: "5:MAJOR.MINOR*"
docker_version: ""

# Docker Compose plugin version (optional)
# Leave empty for latest
docker_compose_version: ""

# crun OCI runtime version, pulled from upstream GitHub releases.
# Ubuntu's apt package is 0.17 (2021) which fails to create containers on newer
# host kernels ("OCI runtime create failed: /usr/bin/crun ... exit status 255").
# Upstream ships static binaries for amd64/arm64 only; 32-bit arm (Raspberry Pi)
# falls back to the distro package via docker_crun_arch_map lookup below.
docker_crun_version: "1.21"
docker_crun_arch_map:
  x86_64: amd64
  aarch64: arm64
docker_crun_releases_url: "https://github.com/containers/crun/releases/download"
docker_crun_asset: "crun-{{ docker_crun_version }}-linux-{{ docker_crun_arch_map[ansible_architecture] }}"

# Path the docker daemon points its "crun" runtime at. Upstream static build
# lands in /usr/local/bin; the apt fallback lives in /usr/bin.
docker_crun_path: "{{ '/usr/local/bin/crun' if ansible_architecture in docker_crun_arch_map else '/usr/bin/crun' }}"
