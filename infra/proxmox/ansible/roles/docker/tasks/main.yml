---
- name: Remove old Docker packages
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Install prerequisites for Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Legacy docker.asc apt source is removed in the common role (before any apt
# task) so the whole play's apt stays readable; nothing to do here.
- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine (latest)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
    state: present
    update_cache: true
  notify: Restart docker
  when: docker_version | length == 0

- name: Install Docker Engine (pinned version)
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_version }}"
      - "docker-ce-cli={{ docker_version }}"
      - containerd.io
      - docker-buildx-plugin
    state: present
    update_cache: true
    force: true
  notify: Restart docker
  when: docker_version | length > 0

- name: Hold Docker packages at pinned version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli
  when: docker_version | length > 0

# runc fails with "net.ipv4.ip_unprivileged_port_start: permission denied"
# inside an unprivileged LXC. crun honours the sysctl that the unprivileged
# container already has set, so containers binding low ports actually start —
# so crun stays the default runtime (see daemon.json below).
#
# The distro's crun is 0.17 (2021), which fails to create ANY container on
# newer host kernels/cgroup2 with "OCI runtime create failed: crun ... exit
# status 255". Pull a current static build from upstream where one is published
# (amd64/arm64); 32-bit arm (Raspberry Pi) has no upstream binary and keeps the
# distro package.
- name: Install crun OCI runtime (upstream static build)
  ansible.builtin.get_url:
    url: "{{ docker_crun_releases_url }}/{{ docker_crun_version }}/{{ docker_crun_asset }}"
    dest: /usr/local/bin/crun
    mode: '0755'
    owner: root
    group: root
  when: ansible_architecture in docker_crun_arch_map
  notify: Restart docker

- name: Install crun OCI runtime (distro package fallback)
  ansible.builtin.apt:
    name: crun
    state: present
    update_cache: true
  when: ansible_architecture not in docker_crun_arch_map
  notify: Restart docker

- name: Install Docker Compose plugin (latest)
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
  when: docker_compose_version | length == 0

- name: Install Docker Compose plugin (pinned version)
  ansible.builtin.apt:
    name: "docker-compose-plugin={{ docker_compose_version }}"
    state: present
    force: true
  when: docker_compose_version | length > 0

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0

- name: Create Docker daemon configuration
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true,
        "userland-proxy": false,
        "storage-driver": "overlay2",
        "default-runtime": "crun",
        "runtimes": {
          "crun": {
            "path": "{{ docker_crun_path }}"
          }
        },
        "default-address-pools": [
          {
            "base": "172.20.0.0/16",
            "size": 24
          }
        ]
      }
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker

# Apply the crun install + daemon.json change now instead of at play end.
# Roles that run after docker (e.g. virtual-device's arm/v7 emulation check)
# invoke `docker run`, which must hit the restarted daemon using the new
# /usr/local/bin/crun 1.21 — otherwise it still uses the broken distro crun 0.17
# and fails with "OCI runtime create failed: crun ... exit status 255".
- name: Flush handlers to apply Docker runtime changes before later roles
  ansible.builtin.meta: flush_handlers
