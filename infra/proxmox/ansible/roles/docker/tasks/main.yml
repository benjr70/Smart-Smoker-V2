---
- name: Remove old Docker packages
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Install prerequisites for Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# A box that previously had Docker installed via the modern docker.asc keyring
# ends up with two apt sources for the same repo once this role adds its
# docker.gpg source, and apt refuses to read them: "Conflicting values set for
# option Signed-By ... docker.asc != docker.gpg". Remove the legacy .asc source
# + keyring first so only this role's docker.gpg source remains. Idempotent.
- name: Remove legacy/conflicting Docker apt source (docker.asc)
  ansible.builtin.shell: |
    grep -rln 'docker\.asc' /etc/apt/sources.list.d/ /etc/apt/sources.list 2>/dev/null \
      | xargs -r rm -f
    rm -f /etc/apt/keyrings/docker.asc
  changed_when: false

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine (latest)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
    state: present
    update_cache: true
  notify: Restart docker
  when: docker_version | length == 0

- name: Install Docker Engine (pinned version)
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_version }}"
      - "docker-ce-cli={{ docker_version }}"
      - containerd.io
      - docker-buildx-plugin
    state: present
    update_cache: true
    force: true
  notify: Restart docker
  when: docker_version | length > 0

- name: Hold Docker packages at pinned version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli
  when: docker_version | length > 0

- name: Install crun OCI runtime
  ansible.builtin.apt:
    name: crun
    state: present
    update_cache: true
  # runc fails with "net.ipv4.ip_unprivileged_port_start: permission denied"
  # inside an unprivileged LXC. crun honours the sysctl that the unprivileged
  # container already has set, so containers binding low ports actually start.
  notify: Restart docker

- name: Install Docker Compose plugin (latest)
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
  when: docker_compose_version | length == 0

- name: Install Docker Compose plugin (pinned version)
  ansible.builtin.apt:
    name: "docker-compose-plugin={{ docker_compose_version }}"
    state: present
    force: true
  when: docker_compose_version | length > 0

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0

- name: Create Docker daemon configuration
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true,
        "userland-proxy": false,
        "storage-driver": "overlay2",
        "default-runtime": "crun",
        "runtimes": {
          "crun": {
            "path": "/usr/bin/crun"
          }
        },
        "default-address-pools": [
          {
            "base": "172.20.0.0/16",
            "size": 24
          }
        ]
      }
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker
