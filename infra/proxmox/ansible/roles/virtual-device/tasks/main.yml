---
# Virtual Smoker Device Role
# Configures the virtual smoker VM to mirror production Raspberry Pi environment

- name: Ensure device user exists
  ansible.builtin.user:
    name: "{{ device_user }}"
    comment: "Virtual Smoker Device User"
    shell: /bin/bash
    create_home: true

- name: Add device user to required groups
  ansible.builtin.user:
    name: "{{ device_user }}"
    groups:
      - docker
      - dialout  # For serial port access (mock)
      - sshd-users  # For SSH access (required by AllowGroups in sshd_config)
    append: true

# Swap Configuration (match production Pi ~100MB)
- name: Check if swap file exists
  ansible.builtin.stat:
    path: /swapfile
  register: swap_file_check

- name: Create swap file
  ansible.builtin.command:
    cmd: "fallocate -l {{ swap_size_mb }}M /swapfile"
  when: not swap_file_check.stat.exists
  changed_when: true

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: '0600'
  when: not swap_file_check.stat.exists

- name: Format swap file
  ansible.builtin.command:
    cmd: mkswap /swapfile
  when: not swap_file_check.stat.exists
  changed_when: true

- name: Enable swap file
  ansible.builtin.command:
    cmd: swapon /swapfile
  when: not swap_file_check.stat.exists
  changed_when: true

- name: Add swap to fstab for persistence
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: '/swapfile none swap sw 0 0'
    state: present
    create: true
    mode: '0644'

# Directory Structure
- name: Create device base directory
  ansible.builtin.file:
    path: "{{ device_base_dir }}"
    state: directory
    owner: "{{ device_user }}"
    group: "{{ device_group }}"
    mode: '0755'

- name: Create device subdirectories
  ansible.builtin.file:
    path: "{{ device_base_dir }}/{{ item }}"
    state: directory
    owner: "{{ device_user }}"
    group: "{{ device_group }}"
    mode: '0755'
  loop:
    - logs
    - config
    - data
    - compose

# Install required packages
- name: Install device-specific packages
  ansible.builtin.apt:
    name:
      - python3-pip
      - i2c-tools
      - git
      - jq
      - curl
    state: present
    update_cache: true

# arm/v7 emulation for device-service (PRD #184 / issue #186).
#
# device-service is published as linux/arm/v7 only (real Pi parity). This VM
# is x86_64, so we register binfmt_misc + qemu-user-static so docker can run
# the arm/v7 image transparently. virtual-smoker is a Proxmox VM, not an LXC
# (see infra/proxmox/terraform/environments/virtual-smoker/variables.tf), so
# binfmt_misc registration works unconditionally — no privileged-CT toggle.
- name: Install qemu-user-static + binfmt-support for arm/v7 emulation
  ansible.builtin.apt:
    name:
      - qemu-user-static
      - binfmt-support
    state: present
    update_cache: true

- name: Enable qemu-arm binfmt_misc handler (idempotent)
  ansible.builtin.command:
    cmd: update-binfmts --enable qemu-arm
  register: binfmt_enable
  changed_when: "'already enabled' not in (binfmt_enable.stderr | default(''))"
  failed_when:
    - binfmt_enable.rc != 0
    - "'already enabled' not in (binfmt_enable.stderr | default(''))"

- name: Verify arm/v7 docker emulation works (fails loud on missing binfmt)
  ansible.builtin.command:
    cmd: docker run --platform linux/arm/v7 --rm alpine uname -m
  register: armv7_check
  changed_when: false
  failed_when: (armv7_check.stdout | trim) != 'armv7l'

# VNC Server for remote GUI access (optional)
- name: Install VNC server packages
  ansible.builtin.apt:
    name:
      - tigervnc-standalone-server
      - tigervnc-common
      - xfce4
      - xfce4-goodies
      - dbus-x11
    state: present
  when: vnc_enabled | default(false)

- name: Create VNC configuration directory
  ansible.builtin.file:
    path: "/home/{{ device_user }}/.vnc"
    state: directory
    owner: "{{ device_user }}"
    group: "{{ device_group }}"
    mode: '0700'
  when: vnc_enabled | default(false)

# Environment file for device service
- name: Create device environment file
  ansible.builtin.copy:
    content: |
      # Virtual Smoker Device Environment
      # Generated by Ansible - Phase 3 Story 2
      NODE_ENV=local
      DEVICE_ID={{ device_id }}
      DEVICE_TYPE={{ device_type }}
      DEVICE_SERVICE_PORT={{ device_service_port }}
      DEVICE_FRONTEND_PORT={{ device_frontend_port }}
    dest: "{{ device_base_dir }}/config/.env"
    owner: "{{ device_user }}"
    group: "{{ device_group }}"
    mode: '0600'

# Summary
- name: Display device setup complete message
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Virtual Smoker Device Configuration Complete"
      - "=========================================="
      - "Device ID: {{ device_id }}"
      - "Device Type: {{ device_type }}"
      - "Base Directory: {{ device_base_dir }}"
      - "Swap Size: {{ swap_size_mb }}MB"
      - "Docker Version: {{ docker_version | default('latest') }}"
      - "VNC Enabled: {{ vnc_enabled | default(false) }}"
      - ""
      - "Next Steps:"
      - "  1. Deploy device software via GitHub Actions workflow"
      - "  2. Copy docker-compose file to {{ device_base_dir }}/compose/"
      - "  3. Run health check: device-health-check.sh"
      - "=========================================="
