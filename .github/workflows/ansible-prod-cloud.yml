name: Ansible Prod Cloud

# Idempotently apply ansible to smokecloud-2 and verify acceptance criteria.
# run_ansible=true also propagates any key or config changes (safe; ansible is idempotent).
# Verification steps run unconditionally — useful as a health-check without an apply.

on:
  workflow_dispatch:
    inputs:
      run_ansible:
        description: 'Run ansible-playbook setup-prod-cloud.yml before verifying'
        type: boolean
        default: false
      tailscale_auth_key:
        description: 'Tailscale auth key (only needed on first-provision; leave blank otherwise)'
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: ansible-prod-cloud
  cancel-in-progress: false

jobs:
  ansible-and-verify:
    name: Ansible apply + verify smokecloud-2
    runs-on: [self-hosted, linux, proxmox]
    # production environment holds prod-scoped secrets (MONGO_APP_PASSWORD etc.)
    # and provides the manual-approval gate for prod config changes.
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H smokecloud-2 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Ansible
        run: |
          pip install --user ansible --quiet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general ansible.posix --force

      - name: Run ansible-playbook setup-prod-cloud.yml
        if: ${{ inputs.run_ansible }}
        working-directory: infra/proxmox/ansible
        env:
          # backups role templates the mongodb backup script with this credential.
          MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
          TS_AUTH_KEY: ${{ inputs.tailscale_auth_key }}
        run: |
          EXTRA_ARGS=(--extra-vars "mongo_app_password=${MONGO_APP_PASSWORD}")
          if [ -n "${TS_AUTH_KEY}" ]; then
            EXTRA_ARGS+=(--extra-vars "tailscale_auth_key=${TS_AUTH_KEY}")
          fi
          ansible-playbook playbooks/setup-prod-cloud.yml \
            --limit prod_cloud \
            "${EXTRA_ARGS[@]}" \
            -v

      # ── Verification ────────────────────────────────────────────────────────

      - name: 4a — SSH reachable + Tailscale hostname
        id: verify_ssh
        continue-on-error: true
        run: |
          ssh -o BatchMode=yes root@smokecloud-2 \
            "tailscale status | grep smokecloud-2 && echo SSH_OK"

      - name: 4b — Docker + compose installed
        id: verify_docker
        continue-on-error: true
        run: |
          ssh -o BatchMode=yes root@smokecloud-2 \
            "docker --version && docker compose version"

      - name: 4c — MongoDB bound to localhost only
        id: verify_mongo_bind
        continue-on-error: true
        run: |
          # Extract local-address column only; peer column always shows 0.0.0.0:* which is a false positive.
          LOCAL=$(ssh -o BatchMode=yes root@smokecloud-2 \
            "ss -tlnp | awk '/27017/{print \$4}'" || echo "NOT_LISTENING")
          echo "mongo local bind: $LOCAL"
          if echo "$LOCAL" | grep -qE "^0\.0\.0\.0:27017$|^:::27017$|\*:27017"; then
            echo "FAIL: MongoDB exposed on all interfaces ($LOCAL)"
            exit 1
          fi
          echo "PASS: MongoDB localhost-only or not yet started ($LOCAL)"

      - name: 4d — Mongo init scripts + compose file deployed by ansible
        id: verify_mongo_users
        continue-on-error: true
        run: |
          # Issue #223 scope: verify ansible deployed the app dir + mongo-init scripts.
          # Actual user seeding (requires prod secrets via prod-deploy.yml) is verified in issue #224.
          # mongo-init path matches the compose mount (./infra/mongodb-init) and
          # the prod-deploy.yml tar-over-ssh copy target ($PROD_DEPLOY_DIR/infra/mongodb-init).
          ssh -o BatchMode=yes root@smokecloud-2 "
            set -e
            test -f /opt/smart-smoker-prod/cloud.docker-compose.yml \
              && echo 'PASS: compose file present'
            test -f /opt/smart-smoker-prod/infra/mongodb-init/01-create-users.js \
              && echo 'PASS: mongo-init script present'
          "

      - name: 4e — Backup timer active
        id: verify_backups
        continue-on-error: true
        run: |
          ssh -o BatchMode=yes root@smokecloud-2 \
            "systemctl is-active backup-mongodb.timer && echo BACKUP_TIMER_OK"

      - name: 4f — Tailscale Funnel configured
        id: verify_funnel
        continue-on-error: true
        run: |
          ssh -o BatchMode=yes root@smokecloud-2 \
            "tailscale funnel status || tailscale serve status || echo FUNNEL_CHECK_DONE"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519

      - name: Verification summary
        if: always()
        run: |
          echo "=========================================="
          echo "smokecloud-2 verification summary"
          echo "=========================================="
          echo "4a SSH+Tailscale:  ${{ steps.verify_ssh.outcome }}"
          echo "4b Docker+compose: ${{ steps.verify_docker.outcome }}"
          echo "4c Mongo bind:     ${{ steps.verify_mongo_bind.outcome }}"
          echo "4d Mongo users:    ${{ steps.verify_mongo_users.outcome }}"
          echo "4e Backup timer:   ${{ steps.verify_backups.outcome }}"
          echo "4f Funnel:         ${{ steps.verify_funnel.outcome }}"
          echo "=========================================="
          echo "Ansible apply: ${{ inputs.run_ansible }}"
          echo "=========================================="
          # Fail the job if any verify step failed (continue-on-error suppressed individual step failure)
          if [[ "${{ steps.verify_ssh.outcome }}"        == "failure" ||
                "${{ steps.verify_docker.outcome }}"     == "failure" ||
                "${{ steps.verify_mongo_bind.outcome }}" == "failure" ||
                "${{ steps.verify_mongo_users.outcome }}" == "failure" ||
                "${{ steps.verify_backups.outcome }}"    == "failure" ]]; then
            echo "One or more verification steps FAILED"
            exit 1
          fi
