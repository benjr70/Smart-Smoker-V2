# Manual deploy to smoker devices (images pulled via smoker.docker-compose.yml).
# Cloud (prod) deploys go through the gated prod-deploy.yml (workflow_dispatch
# with a `version` input) since the legacy cloud-deploy.yml + SmokeCloud runner
# were retired (#225).

name: Deploy Version

on:
  workflow_dispatch:
    inputs:
      deploy_smoker:
        description: 'Deploy to smoker devices'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-version
  cancel-in-progress: true

jobs:
  deploy-smoker:
    if: ${{ github.event.inputs.deploy_smoker == 'true' }}
    uses: ./.github/workflows/smoker-deploy.yml
    secrets: inherit
