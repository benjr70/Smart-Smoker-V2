# Virtual Smoker Device Docker Compose
# Phase 3 Story 2 - Mirrors production Raspberry Pi configuration
#
# Key differences from production (smoker.docker-compose.yml):
#   - Uses NODE_ENV=local for device-service emulator mode
#   - device-service runs the arm/v7 image under qemu-user-static emulation
#     (host is x86_64; binfmt_misc registered by the virtual-device Ansible
#     role). frontend + watchtower run native amd64.
#   - No physical USB serial device (/dev/ttyUSB0)
#   - VNC display instead of physical touchscreen
#
# Usage:
#   docker compose -f virtual-smoker.docker-compose.yml up -d
#
# Environment variables (from .env or exported):
#   - VERSION: Image tag (default: nightly)
#   - REPO_USER: Docker Hub username for Watchtower (optional)
#   - REPO_PASS: Docker Hub token for Watchtower (optional)

services:
  deviceService:
    container_name: device_service
    image: 'benjr70/smart-smoker-device-service:${VERSION:-nightly}'
    platform: linux/arm/v7 # Image is published arm/v7 only; host runs it via qemu-user-static
    pull_policy: always
    restart: always
    network_mode: host
    environment:
      - NODE_ENV=local # Enable emulator mode for temperature simulation
    volumes:
      - '/var/run/dbus:/var/run/dbus'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3003/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    container_name: frontend_smoker
    image: 'benjr70/smart-smoker-smoker:${VERSION:-nightly}'
    pull_policy: always
    restart: always
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Electron shell is optional for virtual device
  # Uncomment if GUI testing is needed with VNC
  # electronShell:
  #   container_name: electron_shell
  #   image: 'benjr70/smart-smoker-electron-shell:${VERSION:-nightly}'
  #   pull_policy: always
  #   restart: always
  #   network_mode: host
  #   depends_on:
  #     frontend:
  #       condition: service_healthy
  #   volumes:
  #     - '/tmp/.X11-unix:/tmp/.X11-unix'
  #     - '/run/dbus/system_bus_socket:/run/dbus/system_bus_socket'
  #     - '/etc/localtime:/etc/localtime:ro'
  #   environment:
  #     - DISPLAY=:1  # VNC display
  #     - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket

  watchtower:
    container_name: watchtower
    # Released `containrrr/watchtower` builds (incl. 1.5.3 and 1.7.1) ship
    # a Docker SDK whose default negotiated API is ~1.25. virtual-smoker's
    # daemon (Docker 26+) refuses to speak older than 1.44 and the
    # container crashloops with "client version 1.25 too old". The
    # `latest-dev` build (Jan 2024) carries the upstream API-negotiation
    # patch. Belt + suspenders: also pin DOCKER_API_VERSION in env so the
    # SDK is forced onto a daemon-compatible version even if the patch
    # regresses. Move back to a stable tag once a published release with
    # API negotiation lands.
    image: containrrr/watchtower:latest-dev # amd64; do not use armhf
    restart: always
    environment:
      - REPO_USER=${REPO_USER:-}
      - REPO_PASS=${REPO_PASS:-}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=false
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup device_service frontend_smoker
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -x watchtower >/dev/null || exit 1']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
